<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="author" content="Paul Daniel">
        <meta name="description" content="amazon checkout page with interactive design">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <title>CheckOut</title>
        <link rel="stylesheet" href="/styles/checkoout-header.css">
        <link rel="stylesheet" href="/styles/checkout.css">
    </head>
    <body>
        <div class="checkout-header">
            <div class="checkout-header-left-side">
                <a href="index.html">
                    <img src="/images/amazon-logo.png" class="checkout-amazon-logo">
                </a>
            </div>

            <div class="checkout-header-middle-side">
                Checkout (3 items)
            </div>

        </div>

        <div class="main">
            <div class="title-page">
                Review your Order
            </div>
        

            <div class="checkout-grid">
                <div class="order-summary">
                    <div class="item-container">
                        <div class="delivery-date">
                            Delivery date: Wednesday, May 20
                        </div>
                        
                        <div class="cart-item-details-grid">
                            <img src="/images/product_images/atomberg-fan-1200mm.jpg" class="product-image">
                            <div class="cart-item-details">
                                <div class="product-name">Atomberg Renesa 1200mm BLDC Ceiling Fan</div>
                                <div class="product-price">₹4590</div>
                                <div class="product-quantity">
                                    Quantity: <span class="quantity-nos">1</span>
                                    <span class="link-update">Update</span>
                                    <span class="link-delete">Delete</span>
                                </div>
                            </div>
                            <div class="delivery-options-1">
                                <div class="delivery-header-text">Choose a delivery option:</div>

                                <div class="delivery-option-selection">
                                    <input type="radio" checked class="delivery-option-input" name="delivery-option-1">
                                    <div> 
                                        <div class="delivery-option-date">Wednesday,May 20</div>
                                        <div class="delivery-option-price">Free Shipping</div>
                                    </div>
                                </div>

                                <div class="delivery-option-selection">
                                    <input type="radio" class="delivery-option-input" name="delivery-option-1">
                                    <div>
                                        <div class="delivery-option-date">Friday,May 15</div>
                                        <div class="delivery-option-price">₹40 - Shipping</div>
                                    </div>
                                </div>

                                <div class="delivery-option-selection">
                                    <input type="radio" class="delivery-option-input" name="delivery-option-1">
                                    <div>
                                        <div class="delivery-option-date">Wednesday,May 13</div>
                                        <div class="delivery-option-price">₹50 - Shipping</div>
                                    </div>
                            </div>

                        </div>

                        

                        </div>
                        
                    </div>
                </div>
                
                <div class="payment-summary">
                    <div class="payment-summary-title">
                        Order Summary
                    </div>
                </div>
            </div>


        </div>
    </body>
</html>
