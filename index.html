<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="author" content="Paul Daniel">
        <meta name="description" content="amazon homepage with interactive design">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <title>Amazon HomePage</title>
        <link rel="stylesheet" href="/styles/amazon-header.css">
        
    </head>
    <body>
        <div class="amazon-header">
            <div class="amazon-header-left-side">
                <a href="index.html" class="amazon-logo-link">
                    <img src="/images/amazon-logo.png" class="amazon-logo">
                </a>
            </div>

            <div class="amazon-header-middle">
                <input type="text" placeholder="Search" class="search-tab">
                <button class="search-button">
                    <img src="/images/search-icon.png" class="search-icon">
                </button>
            </div>

            <div class="amazon-header-right-side">
                <a href="/checkout.html" class="cart-link">
                    <div class="cart-quantity">3</div>
                    <img src="/images/cart-icon.png" class="cart-icon">
                </a>

                <a class="orders-link" href="/orders.html">
                    <span class="orders-text">Orders</span>
                </a>
            </div>
        </div>

        <div class="main">
            <div class="products-grid">
                <div class="single-product-container">
                    <div class="single-product-container">
                        <img>
                    </div>

                </div>
            </div>
        </div>
    </body>
</html>
