<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="author" content="Paul Daniel">
        <meta name="description" content="amazon homepage with interactive design">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <title>Amazon HomePage</title>
        <link rel="stylesheet" href="/styles/amazon-header.css">
        <link rel="stylesheet" href="/styles/index.css">
        
    </head>
    <body>


        <div class="amazon-header">
            <div class="amazon-header-left-side">
                <a href="index.html" class="amazon-logo-link">
                    <img src="/images/amazon-logo.png" class="amazon-logo">
                </a>
            </div>

            <div class="amazon-header-middle">
                <input type="text" placeholder="Search" class="search-tab">
                <button class="search-button">
                    <img src="/images/search-icon.png" class="search-icon">
                </button>
            </div>

            <div class="amazon-header-right-side">
                <a href="/checkout.html" class="cart-link">
                    <div class="cart-quantity">5</div>
                    <img src="/images/cart-icon.png" class="cart-icon">
                </a>

                <a class="orders-link" href="/orders.html">
                    <span class="orders-text">Orders</span>
                </a>
            </div>
        </div>




        <div class="main">
            <div class="products-grid js-products-grid">
                <div class="single-product-container">
                    <div class="single-product-image-container">
                        <img src="/images/product_images/atomberg-fan-1200mm.jpg" class="product-image">
                    </div>

                    <div class="product-name">
                        Atomberg Renesa 1200mm BLDC Ceiling Fan
                    </div>

                    <div class="product-rating-container">
                        <img src="/images/ratings/rating-45.png" class="rating-image">
                        <div class="product-rating-count">
                            1250
                        </div>
                    </div>

                    <div class="product-price">
                        ₹4590
                    </div>

                    <div class="add-to-cart">
                        <button class="add-to-cart-button">Add to cart</button>
                    </div>
                </div>
            </div>
        </div>

        <script src="/scripts/products.js"></script>
        <script src="/scripts/index.js"></script>
    </body>
</html>
