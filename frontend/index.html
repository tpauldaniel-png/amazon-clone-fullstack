<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="author" content="Paul Daniel">
        <meta name="description" content="amazon homepage with interactive design">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <title>Amazon HomePage</title>
        <link rel="stylesheet" href="/frontend/styles/amazon-header.css">
        <link rel="stylesheet" href="/frontend/styles/index.css">
        
    </head>
    <body>


        <div class="amazon-header">
            <div class="amazon-header-left-side">
                <a href="index.html" class="amazon-logo-link">
                    <img src="/frontend/images/amazon-logo.png" class="amazon-logo">
                </a>
            </div>

            <div class="amazon-header-middle">
                <input type="text" placeholder="Search" class="search-tab">
                <button class="search-button">
                    <img src="/frontend/images/search-icon.png" class="search-icon">
                </button>
            </div>

            <div class="amazon-header-right-side">
                <a href="/frontend/checkout.html" class="cart-link">
                    <div class="cart-quantity js-cart-quantity">0</div>
                    <img src="/frontend/images/cart-icon.png" class="cart-icon">
                </a>

                <a class="orders-link" href="/frontend/orders.html">
                    <span class="orders-text">Orders</span>
                </a>
            </div>
        </div>




        <div class="main">
            <div class="products-grid js-products-grid">
                <div class="single-product-container">
                    <div class="single-product-image-container">
                        <img src="/frontend/images/product_images/atomberg-fan-1200mm.jpg" class="product-image">
                    </div>

                    <div class="product-name">
                        Atomberg Renesa 1200mm BLDC Ceiling Fan
                    </div>

                    <div class="product-rating-container">
                        <img src="/frontend/images/ratings/rating-45.png" class="rating-image">
                        <div class="product-rating-count">
                            1250
                        </div>
                    </div>

                    <div class="product-price">
                        ₹4590
                    </div>

                    <div class="quantity-selector">
                        <select>
                            <option selected value="1">1</option>
                            <option>2</option>
                            <option>3</option>
                            <option>4</option>
                            <option>5</option>
                            <option>6</option>
                            <option>7</option>
                            <option>8</option>
                            <option>9</option>
                            <option>10</option>
                        </select>
                    </div>


                    <div class="confirmation-message">
                        message
                    </div>
                    <div class="add-to-cart">
                        <button class="add-to-cart-button js-add-to-cart-button">Add to cart</button>
                    </div>
                </div>
            </div>
        </div>

        
        
        <script type="module" src="/frontend/scripts/index.js"></script>
    </body>
</html>
