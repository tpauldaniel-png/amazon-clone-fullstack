<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="author" content="Paul Daniel">
        <meta name="description" content="login page for amazon-clone">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <title>Login</title>
        <link rel="stylesheet" href="/frontend/styles/login.css">
    </head>
    <body>

        <div class="amazon-header">
            <img src="/frontend/images/amazon-logo.png" class="amazon-logo">
        </div>

        <div class="form-container">
            <form>
                <h1>Login</h1>

                <div>
                    <label for="email">Email</label>
                </div>
                <div>
                    <input type="email" name="email" id="name" placeholder="Enter your email here" autofocus required>
                </div>
                <br>

                <div>
                    <label for="password">Password</label>
                </div>
                <div>
                    <input type="password" name="password" id="password" placeholder="Enter your password here" required>
                </div>
                <br>

                <div>
                    <button type="submit" class="button">Login</button>
                </div>
                <br>

                <p>New to Amazon?</p>
                <div>
                    <a href="/frontend/register.html">Create your Amazon Account</a>
                </div>
            </form>
        </div>
    </body>
</html>
